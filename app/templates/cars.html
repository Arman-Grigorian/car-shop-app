<!DOCTYPE html>
<html>
<head>
    <title>Our Cars</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>Available Cars</h1>
        <div class="car-grid">
            {% for car in cars %}
            <div class="car-card">
                <img src="{{ car.image }}" alt="{{ car.name }}">
                <h2>{{ car.name }}</h2>
                <p class="price">{{ car.price }}</p>
            </div>
            {% endfor %}
        </div>
        <a class="btn" href="/">Back Home</a>
    </div>
</body>
</html>
